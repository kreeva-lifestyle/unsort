<!doctype html><html><head><meta charset="utf-8"><title>Text &amp; borders</title><link rel="stylesheet" href="_card.css"></head>
<body>
  <div class="row" style="gap:18px">
    <div class="col grow" style="gap:10px">
      <div class="eyebrow">Text roles</div>
      <div style="display:flex;align-items:center;gap:10px"><span style="width:32px;height:32px;border-radius:6px;background:#E2E8F0"></span><div><div style="color:#E2E8F0;font-size:13px;font-weight:600">Primary</div><div class="mono" style="font-size:10px;color:#4A5568">#E2E8F0 · --do-tx-1</div></div></div>
      <div style="display:flex;align-items:center;gap:10px"><span style="width:32px;height:32px;border-radius:6px;background:#8896B0"></span><div><div style="color:#8896B0;font-size:13px;font-weight:500">Secondary</div><div class="mono" style="font-size:10px;color:#4A5568">#8896B0 · --do-tx-2</div></div></div>
      <div style="display:flex;align-items:center;gap:10px"><span style="width:32px;height:32px;border-radius:6px;background:#4A5568"></span><div><div style="color:#4A5568;font-size:13px;font-weight:500">Tertiary (labels)</div><div class="mono" style="font-size:10px;color:#4A5568">#4A5568 · --do-tx-3</div></div></div>
    </div>
    <div class="col grow" style="gap:10px">
      <div class="eyebrow">Borders &amp; rings</div>
      <div style="height:36px;border:1px solid rgba(255,255,255,.05);border-radius:8px;background:rgba(255,255,255,.02);display:flex;align-items:center;padding:0 10px;font-size:10px;color:#8896B0">Hairline · <span class="mono" style="margin-left:6px;color:#4A5568">white / 5%</span></div>
      <div style="height:36px;border:1px solid rgba(255,255,255,.08);border-radius:8px;background:rgba(255,255,255,.02);display:flex;align-items:center;padding:0 10px;font-size:10px;color:#8896B0">Emphasized · <span class="mono" style="margin-left:6px;color:#4A5568">white / 8%</span></div>
      <div style="height:36px;border:1px solid rgba(99,102,241,.35);border-radius:8px;background:rgba(255,255,255,.02);box-shadow:0 0 0 2px rgba(99,102,241,.08);display:flex;align-items:center;padding:0 10px;font-size:10px;color:#E2E8F0">Focus ring · <span class="mono" style="margin-left:6px;color:#818CF8">indigo / 35% + 2px / 8%</span></div>
    </div>
  </div>
</body></html>
