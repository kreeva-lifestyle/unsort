<!doctype html><html><head><meta charset="utf-8"><title>Wordmark</title><link rel="stylesheet" href="_card.css"></head>
<body>
  <div style="display:flex;align-items:center;gap:14px">
    <!-- brand dot -->
    <div style="position:relative;width:48px;height:48px;display:flex;align-items:center;justify-content:center">
      <div style="position:absolute;inset:0;background:radial-gradient(circle,rgba(99,102,241,.35) 0%,transparent 70%)"></div>
      <div style="width:14px;height:14px;border-radius:50%;background:linear-gradient(135deg,#6366F1,#818CF8);box-shadow:0 0 10px rgba(99,102,241,.55);position:relative"></div>
    </div>
    <div>
      <div class="sora" style="font-weight:800;font-size:28px;letter-spacing:-0.5px;background:linear-gradient(135deg,#6366F1,#818CF8);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;line-height:1">DailyOffice</div>
      <div style="font-size:9px;color:#4A5568;letter-spacing:3px;text-transform:uppercase;margin-top:6px">Your Workspace, Simplified</div>
    </div>
  </div>
  <div style="margin-top:18px;display:flex;gap:18px;align-items:center">
    <div style="background:#0B0F19;border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:10px 14px;display:flex;gap:8px;align-items:center">
      <div style="width:6px;height:6px;border-radius:50%;background:linear-gradient(135deg,#6366F1,#818CF8);box-shadow:0 0 8px rgba(99,102,241,.55)"></div>
      <span class="sora" style="font-weight:700;font-size:13px;color:#E2E8F0">Inventory</span>
    </div>
    <div style="font-size:9px;color:#4A5568">Header-bar lock-up · 6px dot + 13 / 700 Sora</div>
  </div>
</body></html>
