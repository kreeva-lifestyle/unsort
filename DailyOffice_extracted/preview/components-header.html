<!doctype html><html><head><meta charset="utf-8"><title>Header bar</title><link rel="stylesheet" href="_card.css"></head>
<body style="padding:0">
  <header style="background:rgba(8,11,20,.6);backdrop-filter:blur(32px);border-bottom:1px solid rgba(255,255,255,.05);padding:0 16px;height:44px;display:flex;align-items:center">
    <div style="display:flex;align-items:center;gap:12px;width:100%">
      <div style="display:flex;align-items:center;gap:8px">
        <div style="width:6px;height:6px;border-radius:50%;background:linear-gradient(135deg,#6366F1,#818CF8);box-shadow:0 0 8px rgba(99,102,241,.33)"></div>
        <h1 style="margin:0;font-size:13px;font-weight:700;color:#E2E8F0;white-space:nowrap;font-family:Sora;letter-spacing:-.2px">Inventory</h1>
      </div>
      <div style="width:1px;height:18px;background:linear-gradient(180deg,transparent,rgba(255,255,255,.08),transparent)"></div>
      <div style="flex:1;max-width:320px">
        <div style="display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);border-radius:8px;padding:5px 10px">
          <svg viewBox="0 0 24 24" style="width:13px;height:13px;opacity:.5" fill="none" stroke="#4A5568" stroke-width="1.8"><path d="M11 19a8 8 0 100-16 8 8 0 000 16zM21 21l-4.35-4.35"/></svg>
          <input style="background:transparent;border:none;outline:none;color:#E2E8F0;font-size:11px;flex:1;font-family:Inter" placeholder="Search items, IDs, SKUs…" />
        </div>
      </div>
      <div style="margin-left:auto;display:flex;align-items:center;gap:4px">
        <button style="width:30px;height:30px;border-radius:7px;border:1px solid rgba(255,255,255,.05);background:rgba(255,255,255,.02);color:#8896B0;display:flex;align-items:center;justify-content:center"><svg viewBox="0 0 24 24" style="width:14px;height:14px" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M3 7V5a2 2 0 012-2h2M17 3h2a2 2 0 012 2v2M21 17v2a2 2 0 01-2 2h-2M7 21H5a2 2 0 01-2-2v-2M8 12h8"/></svg></button>
        <div style="position:relative">
          <button style="width:30px;height:30px;border-radius:7px;border:1px solid rgba(255,255,255,.05);background:rgba(255,255,255,.02);color:#8896B0;display:flex;align-items:center;justify-content:center"><svg viewBox="0 0 24 24" style="width:14px;height:14px" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/></svg></button>
          <span style="position:absolute;top:-3px;right:-3px;width:14px;height:14px;background:#6366F1;color:#fff;border-radius:50%;font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center;font-family:JetBrains Mono;box-shadow:0 0 6px rgba(99,102,241,.4)">2</span>
        </div>
      </div>
    </div>
  </header>
  <div style="padding:14px 16px;background:#060810">
    <div style="font-size:9px;color:#4A5568;letter-spacing:.08em;text-transform:uppercase;font-weight:600">44 px sticky · brand dot · divider · search · scan · bell</div>
  </div>
</body></html>
