<!doctype html><html><head><meta charset="utf-8"><title>Brand</title><link rel="stylesheet" href="_card.css"></head>
<body>
  <div class="row">
    <div class="sw grow"><div class="sw-chip" style="background:#6366F1"></div><span class="sw-name">Accent · Indigo</span><span class="sw-hex">#6366F1 · --do-ac</span></div>
    <div class="sw grow"><div class="sw-chip" style="background:#818CF8"></div><span class="sw-name">Accent 2 · Periwinkle</span><span class="sw-hex">#818CF8 · --do-ac-2</span></div>
    <div class="sw grow"><div class="sw-chip" style="background:linear-gradient(135deg,#6366F1,#818CF8)"></div><span class="sw-name">Brand Gradient</span><span class="sw-hex">135° · wordmark + primary CTA</span></div>
    <div class="sw grow"><div class="sw-chip" style="background:#060810;display:flex;align-items:center;justify-content:center"><div style="width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,#6366F1,#818CF8);box-shadow:0 0 10px rgba(99,102,241,.55)"></div></div><span class="sw-name">Accent Glow</span><span class="sw-hex">0 0 8px #6366F1 / 55%</span></div>
    <div class="sw grow"><div class="sw-chip" style="background:rgba(99,102,241,0.08)"></div><span class="sw-name">Accent Tint 8%</span><span class="sw-hex">active nav bg</span></div>
    <div class="sw grow"><div class="sw-chip" style="background:rgba(99,102,241,0.12)"></div><span class="sw-name">Accent Tint 12%</span><span class="sw-hex">active icon tile</span></div>
  </div>
</body></html>
