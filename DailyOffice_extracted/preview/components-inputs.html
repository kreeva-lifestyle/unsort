<!doctype html><html><head><meta charset="utf-8"><title>Inputs</title><link rel="stylesheet" href="_card.css"></head>
<body>
  <style>
    .lbl{display:block;font-size:10px;font-weight:600;color:#4A5568;margin-bottom:5px;letter-spacing:0.06em;text-transform:uppercase;font-family:Inter}
    .fi{width:100%;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,.05);border-radius:6px;color:#E2E8F0;font-family:Inter;font-size:12px;padding:7px 10px;outline:none}
    .fi:focus{border-color:rgba(99,102,241,.35);box-shadow:0 0 0 2px rgba(99,102,241,.08)}
    .fi::placeholder{color:#4A5568}
  </style>
  <div class="col" style="gap:12px">
    <div class="row" style="gap:12px">
      <div style="flex:1"><label class="lbl">Product Name</label><input class="fi" value="Kreeva Bedsheet · Queen" /></div>
      <div style="flex:1"><label class="lbl">SKU</label><input class="fi" value="KRV-BS-Q-018" style="font-family:JetBrains Mono" /></div>
    </div>
    <div class="row" style="gap:12px">
      <div style="flex:1"><label class="lbl">Status</label><select class="fi"><option>Unsorted</option><option>Damaged</option><option>Complete</option><option>Dry Clean</option></select></div>
      <div style="flex:1"><label class="lbl">Location</label><input class="fi" placeholder="e.g. Rack B-3" /></div>
    </div>
    <div style="display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,.05);border-radius:8px;padding:5px 10px">
      <svg viewBox="0 0 24 24" style="width:13px;height:13px;opacity:.5" fill="none" stroke="#4A5568" stroke-width="1.8"><path d="M11 19a8 8 0 100-16 8 8 0 000 16zM21 21l-4.35-4.35"/></svg>
      <input style="background:transparent;border:none;outline:none;color:#E2E8F0;font-size:11px;flex:1;font-family:Inter" placeholder="Search items, IDs, SKUs…" />
    </div>
  </div>
</body></html>
