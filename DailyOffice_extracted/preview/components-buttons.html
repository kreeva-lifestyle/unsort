<!doctype html><html><head><meta charset="utf-8"><title>Buttons</title><link rel="stylesheet" href="_card.css"></head>
<body>
  <div class="col" style="gap:14px">
    <div class="row" style="gap:10px;align-items:center">
      <button style="padding:5px 12px;border:none;border-radius:6px;background:linear-gradient(135deg,rgba(99,102,241,.87),rgba(129,140,248,.80));color:#fff;font-weight:600;font-size:11px;font-family:Inter;box-shadow:0 2px 10px rgba(99,102,241,.25);letter-spacing:.02em;cursor:pointer">Save Changes</button>
      <button style="padding:5px 12px;border:1px solid rgba(99,102,241,.15);border-radius:6px;background:rgba(99,102,241,.06);color:#818CF8;font-weight:500;font-size:11px;font-family:Inter;cursor:pointer">Edit</button>
      <button style="padding:4px 10px;border:1px solid rgba(239,68,68,.18);border-radius:6px;background:rgba(239,68,68,.08);color:#FCA5A5;font-weight:500;font-size:10px;font-family:Inter;cursor:pointer">Delete</button>
      <button style="padding:5px 12px;border:1px solid rgba(255,255,255,.05);border-radius:6px;background:rgba(255,255,255,.02);color:#8896B0;font-weight:500;font-size:11px;font-family:Inter;cursor:pointer">Cancel</button>
    </div>
    <div class="row" style="gap:10px;align-items:center">
      <button style="padding:3px 8px;border:none;border-radius:6px;background:linear-gradient(135deg,rgba(99,102,241,.87),rgba(129,140,248,.80));color:#fff;font-weight:600;font-size:10px;font-family:Inter;box-shadow:0 2px 10px rgba(99,102,241,.25);cursor:pointer">View</button>
      <button style="padding:3px 8px;border:1px solid rgba(99,102,241,.15);border-radius:6px;background:rgba(99,102,241,.06);color:#818CF8;font-weight:500;font-size:10px;font-family:Inter;cursor:pointer">Edit</button>
      <button style="padding:3px 8px;border:1px solid rgba(16,185,129,.2);border-radius:6px;background:rgba(16,185,129,.08);color:#4ADE80;font-weight:500;font-size:10px;font-family:Inter;cursor:pointer">Complete</button>
      <button style="width:30px;height:30px;border-radius:7px;border:1px solid rgba(255,255,255,.05);background:rgba(255,255,255,.02);color:#8896B0;display:inline-flex;align-items:center;justify-content:center;cursor:pointer"><svg viewBox="0 0 24 24" style="width:14px;height:14px" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M3 7V5a2 2 0 012-2h2M17 3h2a2 2 0 012 2v2M21 17v2a2 2 0 01-2 2h-2M7 21H5a2 2 0 01-2-2v-2M8 12h8"/></svg></button>
      <div style="position:relative"><button style="width:30px;height:30px;border-radius:7px;border:1px solid rgba(255,255,255,.05);background:rgba(255,255,255,.02);color:#8896B0;display:inline-flex;align-items:center;justify-content:center;cursor:pointer"><svg viewBox="0 0 24 24" style="width:14px;height:14px" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/></svg></button><span style="position:absolute;top:-3px;right:-3px;width:14px;height:14px;background:#6366F1;color:#fff;border-radius:50%;font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center;font-family:JetBrains Mono;box-shadow:0 0 6px rgba(99,102,241,.4)">3</span></div>
    </div>
    <div class="row" style="gap:12px;align-items:center">
      <span class="eyebrow" style="margin:0">Primary · Ghost · Danger · Neutral · small variants · Icon · Bell</span>
    </div>
  </div>
</body></html>
