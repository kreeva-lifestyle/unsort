<!doctype html><html><head><meta charset="utf-8"><title>Status tags</title><link rel="stylesheet" href="_card.css"></head>
<body>
  <style>
    .tag{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:4px;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;font-family:Inter}
  </style>
  <div class="col" style="gap:10px">
    <div class="eyebrow">Inventory status — <span style="color:#4A5568">inventory_items.status</span></div>
    <div class="row" style="gap:8px;flex-wrap:wrap">
      <span class="tag" style="background:rgba(34,197,94,.1);color:#4ADE80;border:1px solid rgba(34,197,94,.25)">Complete</span>
      <span class="tag" style="background:rgba(245,158,11,.1);color:#FCD34D;border:1px solid rgba(245,158,11,.25)">Unsorted</span>
      <span class="tag" style="background:rgba(239,68,68,.1);color:#FCA5A5;border:1px solid rgba(239,68,68,.25)">Damaged</span>
      <span class="tag" style="background:rgba(56,189,248,.1);color:#7DD3FC;border:1px solid rgba(56,189,248,.25)">Dry Clean</span>
      <span class="tag" style="background:rgba(34,197,94,.15);color:#4ADE80;border:1px solid rgba(34,197,94,.30)">Completed</span>
    </div>
    <div class="eyebrow" style="margin-top:6px">Payment / challan status</div>
    <div class="row" style="gap:8px;flex-wrap:wrap">
      <span class="tag" style="background:rgba(34,197,94,.12);color:#4ADE80;border:1px solid rgba(34,197,94,.28)">Paid</span>
      <span class="tag" style="background:rgba(245,158,11,.1);color:#FCD34D;border:1px solid rgba(245,158,11,.25)">Partial</span>
      <span class="tag" style="background:rgba(239,68,68,.1);color:#FCA5A5;border:1px solid rgba(239,68,68,.25)">Unpaid</span>
      <span class="tag" style="background:rgba(255,255,255,.04);color:#8896B0;border:1px solid rgba(255,255,255,.08)">Draft</span>
      <span class="tag" style="background:rgba(255,255,255,.02);color:#4A5568;border:1px solid rgba(255,255,255,.05);text-decoration:line-through">Voided</span>
    </div>
    <div style="margin-top:6px;font-size:10px;color:#4A5568">Recipe: <span class="mono" style="color:#8896B0">10% bg · 25% border · light-tint fg</span></div>
  </div>
</body></html>
