<!doctype html><html><head><meta charset="utf-8"><title>Stat cards</title><link rel="stylesheet" href="_card.css"></head>
<body>
  <style>
    .stat{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);border-radius:10px;padding:12px 14px;position:relative;overflow:hidden}
    .stat .bar{position:absolute;top:0;left:0;right:0;height:2px}
    .stat .label{font-size:8px;color:#4A5568;letter-spacing:.08em;font-weight:600;text-transform:uppercase;margin-bottom:4px}
    .stat .val{font-family:Sora;font-weight:700;font-size:20px;margin:0;font-variant-numeric:tabular-nums}
  </style>
  <div class="row" style="gap:8px">
    <div class="stat" style="flex:1">
      <div class="bar" style="background:linear-gradient(90deg,#6366F1cc,#6366F133)"></div>
      <p class="label">Today's Scans</p>
      <p class="val" style="color:#6366F1">248</p>
    </div>
    <div class="stat" style="flex:1">
      <div class="bar" style="background:linear-gradient(90deg,#22C55Ecc,#22C55E33)"></div>
      <p class="label">Today's Revenue</p>
      <p class="val" style="color:#22C55E">₹48,250</p>
    </div>
    <div class="stat" style="flex:1">
      <div class="bar" style="background:linear-gradient(90deg,#F59E0Bcc,#F59E0B33)"></div>
      <p class="label">Unsorted Items</p>
      <p class="val" style="color:#F59E0B">37</p>
    </div>
    <div class="stat" style="flex:1">
      <div class="bar" style="background:linear-gradient(90deg,#38BDF8cc,#38BDF833)"></div>
      <p class="label">Cash in Hand</p>
      <p class="val" style="color:#38BDF8">₹12,480</p>
    </div>
  </div>
  <div style="margin-top:10px;font-size:9px;color:#4A5568;letter-spacing:.08em;text-transform:uppercase;font-weight:600">2 px top gradient bar · eyebrow label · 20 / 700 sora numeric</div>
</body></html>
