<!doctype html><html><head><meta charset="utf-8"><title>Semantic colors</title><link rel="stylesheet" href="_card.css"></head>
<body>
  <div class="row">
    <div class="sw grow"><div class="sw-chip" style="background:#22C55E"></div><span class="sw-name">Success · complete</span><span class="sw-hex">#22C55E · --do-success</span></div>
    <div class="sw grow"><div class="sw-chip" style="background:#EF4444"></div><span class="sw-name">Danger · damaged</span><span class="sw-hex">#EF4444 · --do-danger</span></div>
    <div class="sw grow"><div class="sw-chip" style="background:#F59E0B"></div><span class="sw-name">Warn · unsorted</span><span class="sw-hex">#F59E0B · --do-warn</span></div>
    <div class="sw grow"><div class="sw-chip" style="background:#38BDF8"></div><span class="sw-name">Info · cash-in-hand</span><span class="sw-hex">#38BDF8 · --do-info</span></div>
    <div class="sw grow"><div class="sw-chip" style="background:#06B6D4"></div><span class="sw-name">Cyan · dry_clean</span><span class="sw-hex">#06B6D4 · --do-cyan</span></div>
    <div class="sw grow"><div class="sw-chip" style="background:#E879F9"></div><span class="sw-name">Magenta (login orb only)</span><span class="sw-hex">#E879F9</span></div>
  </div>
</body></html>
