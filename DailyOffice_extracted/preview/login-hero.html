<!doctype html><html><head><meta charset="utf-8"><title>Login orbs</title><link rel="stylesheet" href="_card.css"></head>
<body style="padding:0;background:#060810;height:300px;overflow:hidden;position:relative">
  <div style="position:absolute;width:400px;height:400px;background:#6366F1;border-radius:50%;filter:blur(80px);opacity:.12;top:-160px;left:-100px"></div>
  <div style="position:absolute;width:350px;height:350px;background:#38BDF8;border-radius:50%;filter:blur(80px);opacity:.12;bottom:-160px;right:-80px"></div>
  <div style="position:absolute;width:250px;height:250px;background:#F59E0B;border-radius:50%;filter:blur(80px);opacity:.12;top:40%;left:60%"></div>
  <div style="position:absolute;width:300px;height:300px;background:#22C55E;border-radius:50%;filter:blur(100px);opacity:.12;bottom:-120px;left:20%"></div>
  <div style="position:absolute;width:200px;height:200px;background:#E879F9;border-radius:50%;filter:blur(80px);opacity:.12;top:-40px;right:20%"></div>
  <div style="position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,.04) 1px,transparent 1px);background-size:24px 24px"></div>
  <div style="position:relative;display:flex;align-items:center;justify-content:center;height:100%;padding:20px">
    <div style="background:rgba(14,18,30,.88);backdrop-filter:blur(32px);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:24px 28px;text-align:center;width:300px;box-shadow:0 24px 80px rgba(0,0,0,.6),0 0 40px rgba(99,102,241,.06)">
      <div style="font-size:24px;font-weight:800;font-family:Sora;letter-spacing:-0.5px;background:linear-gradient(135deg,#6366F1,#818CF8);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent">DailyOffice</div>
      <div style="font-size:8px;color:#4A5568;letter-spacing:3px;text-transform:uppercase;margin:4px 0 12px">Your Workspace, Simplified</div>
      <div style="height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);margin-bottom:16px"></div>
      <button style="width:100%;padding:9px 16px;border:none;border-radius:10px;background:linear-gradient(135deg,#6366F1,#818CF8);color:#fff;font-weight:700;font-size:12px;box-shadow:0 4px 20px rgba(99,102,241,.35);cursor:pointer;font-family:Inter">Sign In</button>
    </div>
  </div>
</body></html>
