<!doctype html><html><head><meta charset="utf-8"><title>Shadows &amp; elevation</title><link rel="stylesheet" href="_card.css"></head>
<body>
  <div class="row" style="gap:14px">
    <div class="col grow" style="gap:8px">
      <div class="eyebrow">Primary button glow</div>
      <div style="height:64px;border-radius:10px;background:#060810;display:flex;align-items:center;justify-content:center"><button style="padding:8px 18px;border:none;border-radius:8px;background:linear-gradient(135deg,rgba(99,102,241,.87),rgba(129,140,248,.80));color:#fff;font-weight:700;font-size:12px;box-shadow:0 2px 10px rgba(99,102,241,.25);font-family:Inter">Sign In</button></div>
      <div class="mono" style="font-size:9px;color:#4A5568">0 2px 10px · indigo / 25%</div>
    </div>
    <div class="col grow" style="gap:8px">
      <div class="eyebrow">Modal shadow</div>
      <div style="height:64px;border-radius:10px;background:#060810;display:flex;align-items:center;justify-content:center;padding:8px"><div style="width:120px;height:48px;border-radius:10px;background:rgba(14,18,30,.96);border:1px solid rgba(255,255,255,.08);box-shadow:0 24px 80px rgba(0,0,0,.65);backdrop-filter:blur(32px)"></div></div>
      <div class="mono" style="font-size:9px;color:#4A5568">0 24px 80px · black / 65%</div>
    </div>
    <div class="col grow" style="gap:8px">
      <div class="eyebrow">Toast / dropdown</div>
      <div style="height:64px;border-radius:10px;background:#060810;display:flex;align-items:center;justify-content:center"><div style="padding:8px 14px;border-radius:6px;background:rgba(12,16,28,.95);border:1px solid rgba(255,255,255,.08);border-left:2px solid #22C55E;box-shadow:0 4px 20px rgba(0,0,0,.5);color:#E2E8F0;font-size:11px">Saved</div></div>
      <div class="mono" style="font-size:9px;color:#4A5568">0 4px 20px · black / 50%</div>
    </div>
  </div>
</body></html>
